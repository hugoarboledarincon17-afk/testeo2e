<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Partida - Noche 1</title>
  <style>
    body {
      margin: 0;
      background: black url('assets/imagenes/escenarios/sala_principal/oficina.png') center/cover no-repeat;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      user-select: none;
    }

    /* textos de ui en esquina superior derecha */
    .ui-texto {
      position: absolute;
      right: 30px;
      color: white;
      font-family: monospace;
      font-size: 18px;
      z-index: 10;
    }

    #texto-hora {
      top: 20px;
      font-size: 24px;
    }

    #texto-noche {
      top: 50px;
    }

    #texto-energia {
      top: 80px;
    }

    /* botones principales abajo */
    #ui-botones {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      z-index: 10;
    }

    .btn {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid white;
      color: white;
      padding: 15px 30px;
      font-size: 20px;
      font-family: monospace;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.3s;
      width: 300px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.6);
      color: black;
    }

    /* pantalla de camaras */
    #camaras {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      z-index: 20;
    }

    /* imagen de camara */
    #vista-camara {
      width: 100%;
      height: 100%;
      background: center/cover no-repeat;
      cursor: crosshair;
    }

    /* scanlines */
    #scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(0deg,
          rgba(0, 0, 0, 0.15) 0px, rgba(0, 0, 0, 0.15) 2px,
          transparent 2px, transparent 4px);
    }

    #instruccion {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-family: monospace;
      font-size: 16px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border: 1px dotted white;
      pointer-events: none;
      z-index: 25;
    }

    /* botones de camara */
    #lista-camaras {
      position: absolute;
      bottom: 120px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 25;
    }

    .btn-cam {
      background: #333;
      border: 1px solid white;
      color: white;
      padding: 10px 20px;
      font-family: monospace;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-cam:hover {
      background: #555;
    }

    .btn-cam.activo {
      background: white;
      color: black;
      font-weight: bold;
    }

    #btn-bajar-cam {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      z-index: 25;
    }

    /* boton de audio de german */
    #btn-audio {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 30;
      background: rgba(0, 60, 0, 0.85);
      border: 2px solid #44ff44;
      color: #44ff44;
      padding: 12px 22px;
      font-family: monospace;
      font-size: 17px;
      cursor: pointer;
    }

    #btn-audio:disabled {
      border-color: #555;
      color: #555;
      cursor: not-allowed;
      background: #111;
    }

    /* contador de retencion */
    #contador-retencion {
      display: none;
      position: absolute;
      top: 70px;
      right: 20px;
      z-index: 30;
      color: #44ff44;
      font-family: monospace;
      font-size: 15px;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 12px;
      border: 1px solid #44ff44;
    }

    /* subtitulo estilo netflix: aparece abajo centrado */
    #subtitulo {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      font-family: monospace;
      font-size: 17px;
      padding: 8px 22px;
      border-radius: 4px;
      white-space: nowrap;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    /* game over */
    #pantalla-gameover {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.93);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: monospace;
      color: white;
      text-align: center;
    }

    #pantalla-gameover h1 {
      font-size: 58px;
      color: #ff2222;
      margin-bottom: 16px;
    }

    #pantalla-gameover p {
      font-size: 20px;
      margin-bottom: 36px;
      color: #aaa;
    }

    #pantalla-gameover button {
      padding: 14px 38px;
      font-size: 19px;
      font-family: monospace;
      background: transparent;
      border: 2px solid white;
      color: white;
      cursor: pointer;
    }

    #pantalla-gameover button:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <!-- video del porton bajando -->
  <video id="video-puerta" src="assets/videos/video_porton_bajando.mp4" playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:5; pointer-events:none;">
  </video>

  <!-- video de golpes en la puerta -->
  <video id="video-golpes" src="assets/videos/golpes en la puerta.mp4" playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:6; pointer-events:none;">
  </video>
  <video id="video-golpes-2" src="assets/videos/golpes en la puerta 2 .mp4" playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:6; pointer-events:none;">
  </video>

  <div id="pantalla-flashes"
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:black; opacity:0; z-index:95; pointer-events:none;">
  </div>

  <!-- screamer de german -->
  <video id="video-screamer" src="assets/videos/SCREAMER GERMAN.mp4" playsinline webkit-playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:90;">
  </video>

  <!-- screamer de german numero 2 -->
  <video id="video-screamer-2" src="assets/videos/screamer german numero 2.mp4" playsinline webkit-playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:90;">
  </video>

  <!-- screamer especial sin energia puerta cerrada -->
  <video id="video-screamer-especial" src="assets/videos/sin energia puerta cerrada.mp4" playsinline webkit-playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:90;">
  </video>

  <!-- video de ganar -->
  <video id="video-ganar" src="assets/videos/ganar.mp4" playsinline webkit-playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:100;">
  </video>

  <audio id="audio-gameover" src="assets/musica/musica_mickey.mp4"></audio>

  <!-- estatica al cerrar camaras -->
  <div id="pantalla-estatica"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: url('assets/imagenes/menu/glitch.gif') center/cover no-repeat; z-index:150; pointer-events:none; opacity: 0.8;">
  </div>

  <!-- audio de german para la mecanica de retencion -->
  <audio id="audio-german" src="assets/musica/german_audio.mp4" preload="auto"></audio>

  <!-- musica de fondo: tension -->
  <audio id="musica-tension" src="assets/musica/sonido de fondo.mp3" loop></audio>

  <!-- audio de pasos cuando llega a camara 4 -->
  <audio id="audio-pasos" src="assets/musica/pasos.mp3" preload="auto"></audio>

  <!-- audio de pasos corriendo para cuando falla la camara -->
  <audio id="audio-pasos-corriendo" src="assets/musica/PASOS CORRIENDO.mp3" preload="auto"></audio>

  <!-- audio de risa de nino ambiente -->
  <audio id="audio-risa" src="assets/musica/risa de niño.mp3" preload="auto"></audio>

  <!-- audio de risa de demonio para bloqueo de camara -->
  <audio id="audio-demonio" src="assets/musica/demonio risa .mp3" preload="auto"></audio>

  <!-- audio de respiracion ambiental -->
  <audio id="audio-respiracion-amb" src="assets/musica/respiracion profunda.mp3" preload="auto"></audio>

  <!-- audios de falta de energia -->
  <audio id="audio-powerdown" src="assets/musica/powerdown.mp3" preload="auto"></audio>
  <audio id="audio-sevalaluz" src="assets/musica/se va la luz.mp3" preload="auto"></audio>
  <audio id="audio-linterna" src="assets/musica/linterna.mp3" preload="auto"></audio>

  <!-- ui de textos -->
  <div id="texto-hora" class="ui-texto">12:00 PM</div>
  <div id="texto-noche" class="ui-texto">Noche 1</div>
  <div id="texto-energia" class="ui-texto">energia: 100%</div>

  <!-- botones principales -->
  <div id="ui-botones">
    <button class="btn" id="btn-puerta" onclick="togglePuerta()">Cerrar Puerta</button>
    <button class="btn" id="btn-camaras" onclick="abrirCamaras()">Subir Camaras</button>
  </div>

  <!-- pantalla de camaras -->
  <div id="camaras">
    <div id="vista-camara"></div>
    <div id="scanlines"></div>
    <div id="instruccion">Manten clic en la pantalla para usar la linterna</div>

    <!-- video de animacion de german saliendo de sala 1 -->
    <video id="video-animacion-german" src="assets/videos/animaciones de camaras/germansala1.mp4" playsinline
      style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:22; pointer-events:none;">
    </video>

    <!-- video de animacion de german saliendo de sala 2 -->
    <video id="video-animacion-german-sala2" src="assets/videos/animaciones de camaras/germansala2.mp4" playsinline
      style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:22; pointer-events:none;">
    </video>


    <!-- boton audio: solo visible cuando ves la camara de german -->
    <button id="btn-audio" onclick="usarAudio()">&#9834; Usar Audio</button>
    <div id="contador-retencion">Reteniendo: <span id="seg-retencion">20</span>s</div>

    <!-- 4 salas: la sala 2 original ha sido eliminada -->
    <div id="lista-camaras">
      <button class="btn-cam activo" id="btn-cam-1" onclick="cambiarCam(1)">CAM 1</button>
      <button class="btn-cam" id="btn-cam-2" onclick="cambiarCam(2)">CAM 2</button>
      <button class="btn-cam" id="btn-cam-3" onclick="cambiarCam(3)">CAM 3</button>
      <button class="btn-cam" id="btn-cam-4" onclick="cambiarCam(4)">CAM 4</button>
    </div>

    <button class="btn" id="btn-bajar-cam" onclick="cerrarCamaras()">Bajar Camaras</button>
  </div>

  <!-- subtitulo estilo netflix -->
  <div id="subtitulo"></div>

  <!-- game over modificado con la imagen de german de pie -->
  <div id="pantalla-gameover" style="background-color: black;">
    <div
      style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('assets/imagenes/escenarios/personajes/german/de_pie.png') center/contain no-repeat; z-index: -1;">
    </div>
    <h1 style="text-shadow: 2px 2px 5px black;">GAME OVER</h1>
    <p id="mensaje-gameover" style="text-shadow: 1px 1px 3px black; color: white; font-size: 24px;">german ha entrado a
      la oficina...</p>
    <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
      <button onclick="window.location.href='juego_noche1.html'" style="background: rgba(0,0,0,0.7);">volver a
        intentarlo</button>
      <button onclick="window.location.href='menu.html'" style="background: rgba(0,0,0,0.7);">volver al menu</button>
    </div>
  </div>

  <script>
    // =============================================
    // 4 salas: 1, 2, 3, 4
    // imagenes base sin personaje
    // =============================================
    var escBase = {
      1: { osc: "assets/imagenes/escenarios/sala1/sala1_oscura.jpeg", lin: "assets/imagenes/escenarios/sala1/sala1_linterna.jpeg" },
      2: { osc: "assets/imagenes/escenarios/sala2/sala2_oscura.jpeg", lin: "assets/imagenes/escenarios/sala2/sala2_linterna.png" },
      3: { osc: "assets/imagenes/escenarios/sala3/sala3_oscura.png", lin: "assets/imagenes/escenarios/sala3/sala3_linterna.png" },
      4: { osc: "assets/imagenes/escenarios/sala4/sala4_oscura.png", lin: "assets/imagenes/escenarios/sala4/sala4_linterna.png" }
    };

    // imagenes de german en cada sala (donde existen)
    var escGerman = {
      1: { osc: "assets/imagenes/escenarios/personajes/german/sala1_oscura.jpg", lin: "assets/imagenes/escenarios/personajes/german/sala1_linterna.jpg" },
      2: { osc: "assets/imagenes/escenarios/personajes/german/sala2_oscura.png", lin: "assets/imagenes/escenarios/personajes/german/sala2_linterna.png" },
      3: { osc: "assets/imagenes/escenarios/personajes/german/sala3_oscura.png", lin: "assets/imagenes/escenarios/personajes/german/sala3_linterna.png" },
      4: { osc: "assets/imagenes/escenarios/personajes/german/sala4_oscura.png", lin: "assets/imagenes/escenarios/personajes/german/sala4_linterna.png" }
    };

    // =============================================
    // estado del juego
    // =============================================
    var camActual = 1;
    var linterna = false;
    var puertaCerrada = false;
    var animandoPuerta = false;
    var hora = 0;
    var energia = 100;

    // german empieza en sala 1, se mueve 1->2->3->4->oficina
    var germanPos = 1;
    var germanRetenido = false;
    var audioEnCooldown = false;

    // contador de segundos mirando la camara de german (para el aura)
    var segMirandoGerman = 0;
    // el hint solo se muestra una vez para no ser pesado
    var hintAuraMostrado = false;
    var juegoTerminado = false;

    // animacion de german saliendo de sala 1
    var animacionGermanActiva = false;
    // animacion de german saliendo de sala 2 (no bloquea el movimiento)
    var animacionGermanSala2Activa = false;

    // probabilidad de movimiento de german (se aumenta a las 5 AM)
    var probabilidadGerman = 0.3;
    var camaraFallo = false;
    var camaraBloqueada = 0; // camara especifica que queda inservible
    var camarasDestruidas = false; // fallo global a las 5 AM

    // =============================================
    // referencias DOM
    // =============================================
    var vistaCam = document.getElementById("vista-camara");
    var panelCamaras = document.getElementById("camaras");
    var videoPuerta = document.getElementById("video-puerta");
    var audioGerman = document.getElementById("audio-german");
    var btnPuerta = document.getElementById("btn-puerta");
    var textoHora = document.getElementById("texto-hora");
    var textoEnergia = document.getElementById("texto-energia");
    var btnAudio = document.getElementById("btn-audio");
    var contadorRet = document.getElementById("contador-retencion");
    var segRet = document.getElementById("seg-retencion");
    var gameOverDiv = document.getElementById("pantalla-gameover");
    var subtitulo = document.getElementById("subtitulo");
    var subTimer = null;
    var musicaTension = document.getElementById("musica-tension");

    function actualizarUIEnergia() {
      if (!textoEnergia) return;
      textoEnergia.innerText = "energia: " + Math.floor(energia) + "%";
      if (energia < 20) {
        textoEnergia.style.color = "#ff0000";
        textoEnergia.style.fontWeight = "bold";
        textoEnergia.style.textShadow = "0 0 10px red";
      } else {
        textoEnergia.style.color = "white";
        textoEnergia.style.fontWeight = "normal";
        textoEnergia.style.textShadow = "none";
      }
    }

    // referencias para el screamer
    var videoScreamer = document.getElementById("video-screamer");
    var audioGameover = document.getElementById("audio-gameover");

    // =============================================
    // desbloqueo de media para moviles y navegadores estrictos
    // =============================================
    var mediaDesbloqueada = false;
    function desbloquearMedia() {
      if (mediaDesbloqueada) return;
      mediaDesbloqueada = true;
      [videoScreamer, document.getElementById("video-screamer-2"), document.getElementById("video-screamer-especial"), document.getElementById("video-golpes"), document.getElementById("video-golpes-2"), audioGameover, audioGerman, videoPuerta, musicaTension, document.getElementById("audio-pasos-corriendo"), document.getElementById("audio-risa"), document.getElementById("audio-demonio"), document.getElementById("audio-respiracion-amb"), document.getElementById("audio-powerdown"), document.getElementById("audio-sevalaluz"), document.getElementById("audio-linterna")].forEach(function (m) {
        if (!m) return;
        m.muted = true;
        var p = m.play();
        if (p !== undefined) {
          p.then(function () {
            m.pause();
            m.muted = false;
            if (m.id === "musica-tension") {
              m.volume = 0.15;
              m.play().catch(function () { });
            } else {
              m.currentTime = 0;
            }
          }).catch(function () { });
        }
      });
    }
    document.addEventListener("click", desbloquearMedia, { once: true });
    document.addEventListener("touchstart", desbloquearMedia, { once: true });

    // =============================================
    // funcion para iniciar el screamer de german
    // oculta todo, reproduce el video con luces y luego muestra el game over
    // =============================================
    function iniciarScreamer(mensaje, usarEspecial) {
      if (juegoTerminado && !usarEspecial) return;
      juegoTerminado = true;
      // Restablecer filtros para que el screamer se vea bien (no oscuro)
      document.body.style.filter = "none";
      cerrarCamaras();
      // Solo detener audios de apagon si NO es el screamer especial (puerta cerrada)
      if (!usarEspecial) {
        detenerAudiosApagon();
      }
      document.getElementById("ui-botones").style.display = "none";
      document.getElementById("texto-hora").style.display = "none";
      document.getElementById("texto-noche").style.display = "none";
      document.getElementById("texto-energia").style.display = "none";

      // establecer mensaje personalizado si existe
      if (mensaje) {
        document.getElementById("mensaje-gameover").innerText = mensaje;
      } else {
        document.getElementById("mensaje-gameover").innerText = "german ha entrado a la oficina...";
      }

      // elegir screamer aleatorio (solo si no es por falta de energia)
      var vid = videoScreamer;
      if (usarEspecial) {
        vid = document.getElementById("video-screamer-especial");
      } else if (mensaje !== "te has quedado sin energia..." && Math.random() < 0.5) {
        vid = document.getElementById("video-screamer-2");
      }

      // reproducir screamer
      vid.style.display = "block";
      vid.currentTime = 0;
      vid.play().catch(function () { });

      // al terminar el screamer, mostrar game over y reproducir musica
      vid.onended = function () {
        detenerAudiosApagon();
        vid.style.display = "none";

        gameOverDiv.style.display = "flex";
        audioGameover.currentTime = 0;
        audioGameover.play().catch(function () { });
      };
    }

    function detenerAudiosApagon() {
      var pwrDown = document.getElementById("audio-powerdown");
      var lzOut = document.getElementById("audio-sevalaluz");
      if (pwrDown) { pwrDown.pause(); pwrDown.currentTime = 0; }
      if (lzOut) { lzOut.pause(); lzOut.currentTime = 0; }
    }

    function reproducirGolpes() {
      var v1 = document.getElementById("video-golpes");
      var v2 = document.getElementById("video-golpes-2");
      if (!v1 || !v2) return null;

      var vid = (Math.random() < 0.5) ? v1 : v2;
      vid.style.display = "block";
      vid.currentTime = 0;
      vid.loop = true; // Loopear para que dure lo necesario
      vid.play().catch(function () { });

      // Retornar funcion para detener el video
      return function () {
        vid.pause();
        vid.style.display = "none";
        vid.loop = false;
      };
    }

    // =============================================
    // parpadeo de luces en la oficina (se mantiene mientras este en CAM 4)
    // =============================================
    var intervalParpadeo = null;
    function actualizarEfectosCam4() {
      var flash = document.getElementById("pantalla-flashes");
      if (!flash) return;
      if (germanPos === 4) {
        if (!intervalParpadeo) {
          flash.style.display = "block";
          intervalParpadeo = setInterval(function () {
            flash.style.opacity = (flash.style.opacity === "0" || flash.style.opacity === "") ? "0.4" : "0";
          }, 100);
          // reproducir audio de pasos al llegar
          var audioPasos = document.getElementById("audio-pasos");
          if (audioPasos) {
            audioPasos.currentTime = 0;
            audioPasos.play().catch(function () { });
          }
        }
      } else {
        if (intervalParpadeo) {
          clearInterval(intervalParpadeo);
          intervalParpadeo = null;
          flash.style.display = "none";
          flash.style.opacity = "0";
        }
      }
    }

    // =============================================
    // muestra un subtitulo estilo netflix durante X segundos
    // =============================================
    function mostrarSub(texto, duracion) {
      clearTimeout(subTimer);
      subtitulo.innerText = texto;
      subtitulo.style.display = "block";
      subtitulo.style.opacity = "1";
      subTimer = setTimeout(function () {
        subtitulo.style.opacity = "0";
        setTimeout(function () { subtitulo.style.display = "none"; }, 400);
      }, duracion || 3000);
    }

    // =============================================
    // devuelve la imagen correcta para la sala
    // si german esta ahi muestra la imagen con el
    // =============================================
    function getImg(sala, usarLinterna) {
      if (sala === germanPos) {
        // Usar la imagen de German en la oscuridad para que su presencia sea real pero oculta
        return usarLinterna ? escGerman[sala].lin : escGerman[sala].osc;
      }
      return usarLinterna ? escBase[sala].lin : escBase[sala].osc;
    }

    // =============================================
    // distorsion de camara al terminar una animacion de german
    // =============================================
    function distorsionCamara() {
      // Solo mostrar el glitch si el jugador tiene las camaras subidas
      if (panelCamaras.style.display !== "block") return;

      var estatica = document.getElementById("pantalla-estatica");
      if (!estatica) return;
      estatica.style.display = "block";
      estatica.style.opacity = "1";
      setTimeout(function () {
        estatica.style.opacity = "0";

    // =============================================
    // aura de german: si llevas 13 segundos seguidos mirando su camara
    // te quita 5 de energia de golpe y el ciclo se repite
    // a los 10 segundos muestra un hint (solo la primera vez)
    // =============================================
    setInterval(function () {
      // si no hay camaras abiertas o no miras a german, resetear
      if (panelCamaras.style.display !== "block" || camActual !== germanPos) {
        segMirandoGerman = 0;
        return;
      }

      segMirandoGerman++;

      // hint de aviso la primera vez, a los 10 segundos
      if (segMirandoGerman === 10 && !hintAuraMostrado) {
        hintAuraMostrado = true;
        mostrarSub("Cuidado... si lo sigues mirando te quitara energia", 3000);
      }

      // a los 13 segundos: drenar 1 de energia y reiniciar el ciclo
      if (segMirandoGerman >= 13) {
        segMirandoGerman = 0;
        energia -= 1;
        if (energia < 0) energia = 0;
        actualizarUIEnergia();
        mostrarSub("El aura de German te ha quitado 1 de energia", 2500);
        if (energia <= 0) apagarTodo();
      }
    }, 1000);

    // =============================================
    // mecanica de audio: retiene a german 20s, cooldown 30s
    // =============================================
    function usarAudio() {
      if (audioEnCooldown || germanRetenido || energia <= 0) return;

      // reproducir audio de german
      audioGerman.currentTime = 0;
      audioGerman.play().catch(function () { });

      germanRetenido = true;
      audioEnCooldown = true;
      btnAudio.disabled = true;
      contadorRet.style.display = "block";

      var segundos = 20;
      segRet.innerText = segundos;
      var iv = setInterval(function () {
        segundos--;
        segRet.innerText = segundos;
        if (segundos <= 0) {
          clearInterval(iv);
          germanRetenido = false;
          contadorRet.style.display = "none";
          // cooldown de 30s antes de poder usar el audio de nuevo
          setTimeout(function () {
            audioEnCooldown = false;
            if (panelCamaras.style.display === "block") actualizarCamara();
          }, 30000);
        }
      }, 1000);

      actualizarCamara();

    // =============================================
    // movimiento de german: cada 10s tiene 30% de avanzar
    // ruta: sala1 -> sala2 -> sala3 -> sala4 -> oficina
    // al llegar a sala4 y la puerta esta cerrada, se va a sala aleatoria
    // =============================================
    // Movimiento normal de German (Sala 1 -> 2 -> 3 -> 4) cada 10s
    setInterval(function () {
      if (germanRetenido || energia <= 0 || juegoTerminado || animacionGermanActiva || germanPos >= 4) return;
      if (Math.random() > probabilidadGerman) return;

      var siguiente = germanPos + 1;

      // si german sale de sala 1, reproducir la animacion en cam 1
      if (germanPos === 1) {
        var videoAnimGerman = document.getElementById("video-animacion-german");
        animacionGermanActiva = true;
        // mostrar el video si el jugador esta viendo cam 1
        if (panelCamaras.style.display === "block") actualizarCamara();

        if (videoAnimGerman) {
          videoAnimGerman.currentTime = 0;
          videoAnimGerman.play().catch(function () { });

          videoAnimGerman.onended = function () {
            // al terminar la animacion, german pasa a la siguiente sala
            animacionGermanActiva = false;
            germanPos = siguiente;
            videoAnimGerman.style.display = "none";
            distorsionCamara();
            actualizarEfectosCam4();
            if (panelCamaras.style.display === "block") actualizarCamara();
          };
        } else {
          // si no hay video, mover directamente
          animacionGermanActiva = false;
          germanPos = siguiente;
          actualizarEfectosCam4();
          if (panelCamaras.style.display === "block") actualizarCamara();
        }
        return;
      }

      // si german sale de sala 2, reproducir la animacion en cam 2 (sin bloquear el movimiento)
      if (germanPos === 2) {
        var videoAnimS2 = document.getElementById("video-animacion-german-sala2");
        if (videoAnimS2) {
          animacionGermanSala2Activa = true;
          // german avanza de inmediato, el video es solo visual
          germanPos = siguiente;
          actualizarEfectosCam4();
          if (panelCamaras.style.display === "block") actualizarCamara();

          videoAnimS2.currentTime = 0;
          videoAnimS2.play().catch(function () { });
          videoAnimS2.onended = function () {
            animacionGermanSala2Activa = false;
            videoAnimS2.style.display = "none";
            distorsionCamara();
            if (panelCamaras.style.display === "block") actualizarCamara();
          };
        } else {
          germanPos = siguiente;
          actualizarEfectosCam4();
          if (panelCamaras.style.display === "block") actualizarCamara();
        }
        return;
      }

      // si german sale de sala 3, glitch y mover sin video
      if (germanPos === 3) {
        germanPos = siguiente;
        actualizarEfectosCam4();
        distorsionCamara();
        if (panelCamaras.style.display === "block") actualizarCamara();
        return;
      }

      // german avanza a la siguiente sala (sin animacion)
      germanPos = siguiente;
      actualizarEfectosCam4();
      if (panelCamaras.style.display === "block") actualizarCamara();

    }, 10000);

    setInterval(function () {

      }

      // Dar una ventana de 2 segundos para reaccionar y cerrar la puerta
      setTimeout(function () {
        if (germanPos !== 4 || germanRetenido || energia <= 0 || juegoTerminado) return;

        if (puertaCerrada) {
          // Si la puerta ya esta cerrada, German choca inmediatamente
          var detenerV = reproducirGolpes();

          mostrarSub("German ha golpeado la puerta! Pierdes 5% de energia", 4000);
          if (energia <= 0) apagarTodo();

          var salaRandom = Math.floor(Math.random() * 3) + 1; // 1, 2 o 3
          setTimeout(function () {
            germanPos = salaRandom;

            // Detener los golpes 1 segundo despues de que se haya ido
            setTimeout(function () {

          }, 2000);
        } else if (animandoPuerta) {
          // Si se esta cerrando, no hacemos nada aqui.
          // La funcion togglePuerta() se encargara de German cuando el video termine.
        } else {
          // puerta abierta y sin cerrar: inicia the screamer (muerte)
          iniciarScreamer();

    // =============================================

    setInterval(function () {

      var gasto = 0.01;

    // =============================================
    // apagon al quedarse sin energia
    // =============================================
    function apagarTodo() {
      if (juegoTerminado) return;
      mostrarSub("¡No tienes energía!", 4000);

      var murioConPuertaCerrada = puertaCerrada || animandoPuerta;

      panelCamaras.style.display = "none";
      videoPuerta.style.display = "none";
      videoPuerta.pause();
      if (audioGerman) audioGerman.pause();
      musicaTension.pause();
      linterna = false;
      puertaCerrada = false;
      animandoPuerta = false;

      // Efecto de "luz pobre" y parpadeo en lugar de negro total
      document.body.style.transition = "filter 2s";
      document.body.style.filter = "brightness(0.05) contrast(1.2)";

      // Iniciar un pequeño parpadeo residual de la luz de la oficina
      var flickerApagon = setInterval(function () {
        if (juegoTerminado) {
          clearInterval(flickerApagon);
          return;
        }
        var b = 0.02 + Math.random() * 0.08;
        document.body.style.filter = "brightness(" + b + ") contrast(1.2)";
      }, 150);

      // Secuencia de audios
      var pwrDown = document.getElementById("audio-powerdown");
      var lzOut = document.getElementById("audio-sevalaluz");

      if (pwrDown) {
        pwrDown.play().catch(function () { });
        pwrDown.onended = function () {
          if (lzOut) {
            lzOut.play().catch(function () { });

            // El screamer salta DURANTE la música de "se va la luz"
            // (entre 4 y 8 segundos después de empezar la música)
            var tiempoParaSusto = 4000 + Math.random() * 4000;
            setTimeout(function () {
              if (!juegoTerminado) {
                iniciarScreamer("te has quedado sin energia...", murioConPuertaCerrada);
              }
            }, tiempoParaSusto);
          } else {
            setTimeout(function () {
              iniciarScreamer("te has quedado sin energia...", murioConPuertaCerrada);
            }, 3000);
          }
        };
      } else {
        // Fallback si no cargan los audios
        setTimeout(function () {
          iniciarScreamer("te has quedado sin energia...");
        }, 3000);
      }
    }

        var listaSonidos = ["audio-demonio", "audio-pasos-corriendo", "audio-risa", "audio-respiracion-amb"];
        var idAzar = listaSonidos[Math.floor(Math.random() * listaSonidos.length)];
        var a = document.getElementById(idAzar);

        if (a) {
          a.currentTime = 0;
          a.play().catch(function () { });
        }
        if (panelCamaras.style.display === "block") actualizarCamara();

        // dura 15 segundos
        setTimeout(function () {
          camaraBloqueada = 0;
          if (panelCamaras.style.display === "block") actualizarCamara();
        }, 15000);
      }
    }, 12000);

    // =============================================
    // efecto reloj roto (5 AM)
    // =============================================
    setInterval(function () {
      if (juegoTerminado || energia <= 0 || hora < 5) return;

      var clock = document.getElementById("texto-hora");
      if (!clock) return;

      // 40% de probabilidad cada 4 segundos de glitch visual
      if (Math.random() < 0.4) {
        var glitches = ["5:?? AM", "??:?? AM", "6:66 AM", "#$:%& AM", "ERROR", "5:-- AM", "88:88"];
        clock.innerText = glitches[Math.floor(Math.random() * glitches.length)];
        clock.style.color = "#ff3333";
        clock.style.textShadow = "0 0 8px red";

        setTimeout(function () {
          if (hora === 5 && !juegoTerminado) {
            clock.innerText = "5:00 AM";
            clock.style.color = "white";
            clock.style.textShadow = "none";
          }
        }, 600 + Math.random() * 1200);
      }
    }, 4000);

    // =============================================
    // Parpadeo de linterna (baja energia < 30%)
    // =============================================
    setInterval(function () {
      if (juegoTerminado || energia <= 0 || camaraFallo || (typeof camaraBloqueada !== 'undefined' && camaraBloqueada !== 0)) return;

      if (linterna && energia < 30) {
        // Generar un parpadeo aleatorio si la energia es baja
        var b = 0.2 + Math.random() * 0.9; // Brillo muy variable para dar miedo
        vistaCam.style.filter = "brightness(" + b + ")";
      } else if (linterna && energia >= 30) {
        // Asegurar que vuelve a la normalidad si la energía sube (aunque no suele subir)
        // o si simplemente estaba parpadeando y ya no
        if (vistaCam.style.filter.includes("brightness")) {
          vistaCam.style.filter = "none";
        }
      }
    }, 60);

  </script>
