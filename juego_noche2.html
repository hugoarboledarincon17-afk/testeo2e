<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Partida - Noche 2</title>
  <style>
    body {
      margin: 0;
      background: black url('assets/imagenes/escenarios/sala_principal/oficina.png') center/cover no-repeat;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      user-select: none;
    }

    /* textos de ui en esquina superior derecha */
    .ui-texto {
      position: absolute;
      right: 30px;
      color: white;
      font-family: monospace;
      font-size: 18px;
      z-index: 10;
    }

    #texto-hora {
      top: 20px;
      font-size: 24px;
    }

    #texto-noche {
      top: 50px;
    }

    #texto-energia {
      top: 80px;
    }

    /* botones principales abajo */
    #ui-botones {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      z-index: 10;
    }

    .btn {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid white;
      color: white;
      padding: 15px 30px;
      font-size: 20px;
      font-family: monospace;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.3s;
      width: 300px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.6);
      color: black;
    }

    /* pantalla de camaras */
    #camaras {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      z-index: 20;
    }

    /* imagen de camara */
    #vista-camara {
      width: 100%;
      height: 100%;
      background: center/cover no-repeat;
      cursor: crosshair;
    }

    /* scanlines */
    #scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(0deg,
          rgba(0, 0, 0, 0.15) 0px, rgba(0, 0, 0, 0.15) 2px,
          transparent 2px, transparent 4px);
    }

    #instruccion {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-family: monospace;
      font-size: 16px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border: 1px dotted white;
      pointer-events: none;
      z-index: 25;
    }

    /* botones de camara */
    #lista-camaras {
      position: absolute;
      bottom: 120px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 25;
    }

    .btn-cam {
      background: #333;
      border: 1px solid white;
      color: white;
      padding: 10px 20px;
      font-family: monospace;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-cam:hover {
      background: #555;
    }

    .btn-cam.activo {
      background: white;
      color: black;
      font-weight: bold;
    }

    #btn-bajar-cam {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      z-index: 25;
    }

    /* boton de audio de alonso */
    #btn-audio {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 30;
      background: rgba(0, 60, 0, 0.85);
      border: 2px solid #44ff44;
      color: #44ff44;
      padding: 12px 22px;
      font-family: monospace;
      font-size: 17px;
      cursor: pointer;
    }

    #btn-audio:disabled {
      border-color: #555;
      color: #555;
      cursor: not-allowed;
      background: #111;
    }

    /* contador de retencion */
    #contador-retencion {
      display: none;
      position: absolute;
      top: 70px;
      right: 20px;
      z-index: 30;
      color: #44ff44;
      font-family: monospace;
      font-size: 15px;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 12px;
      border: 1px solid #44ff44;
    }

    /* subtitulo estilo netflix: aparece abajo centrado */
    #subtitulo {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      font-family: monospace;
      font-size: 17px;
      padding: 8px 22px;
      border-radius: 4px;
      white-space: nowrap;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    /* game over */
    #pantalla-gameover {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.93);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: monospace;
      color: white;
      text-align: center;
    }

    #pantalla-gameover h1 {
      font-size: 58px;
      color: #ff2222;
      margin-bottom: 16px;
    }

    #pantalla-gameover p {
      font-size: 20px;
      margin-bottom: 36px;
      color: #aaa;
    }

    #pantalla-gameover button {
      padding: 14px 38px;
      font-size: 19px;
      font-family: monospace;
      background: transparent;
      border: 2px solid white;
      color: white;
      cursor: pointer;
    }

    #pantalla-gameover button:hover {
      background: white;
      color: black;
    }

    /* animacion de respiracion visual */
    @keyframes visualBreathing {
      0% {
        opacity: 0;
      }

      50% {
        opacity: 0.25;
      }

      100% {
        opacity: 0;
      }
    }

    .efecto-respiracion {
      animation: visualBreathing 4s ease-in-out infinite;
    }

    /* efecto glitch para la caja de musica */
    @keyframes glitchCaja {
      0% {
        filter: none;
        transform: translate(0);
      }

      10% {
        filter: hue-rotate(90deg) brightness(1.5);
        transform: translate(2px, -2px);
      }

      20% {
        filter: invert(0.2) contrast(2);
        transform: translate(-2px, 2px);
      }

      30% {
        filter: none;
        transform: translate(0);
      }

      40% {
        filter: saturate(5) blur(1px);
        transform: translate(3px, 1px);
      }

      50% {
        filter: none;
        transform: translate(0);
      }

      100% {
        filter: none;
        transform: translate(0);
      }
    }

    .glitch-caja-activa {
      animation: glitchCaja 0.3s infinite !important;
    }
  </style>
</head>

<body>

  <!-- video del porton bajando -->
  <video id="video-puerta" src="assets/videos/video_porton_bajando.mp4" playsinline webkit-playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:5; pointer-events:none;">
  </video>

  <!-- video de golpes en la puerta -->
  <video id="video-golpes" src="assets/videos/golpes en la puerta.mp4" playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:6; pointer-events:none;">
  </video>
  <video id="video-golpes-2" src="assets/videos/golpes en la puerta 2 .mp4" playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:6; pointer-events:none;">
  </video>

  <!-- screamer de alonso -->
  <video id="video-screamer" src="assets/videos/screamer_alonso.mp4" playsinline webkit-playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:90;">
  </video>

  <!-- video de ganar -->
  <video id="video-ganar" src="assets/videos/ganar.mp4" playsinline webkit-playsinline
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:100;">
  </video>

  <div id="pantalla-flashes"
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0; z-index:95; pointer-events:none;">
  </div>

  <div id="pantalla-parpadeo"
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:black; opacity:0; z-index:96; pointer-events:none;">
  </div>
  <div id="pantalla-respiracion"
    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:black; opacity:0; z-index:97; pointer-events:none;">
  </div>

  <!-- estatica al cerrar camaras / distorsion de animacion -->
  <div id="pantalla-estatica"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: url('assets/imagenes/menu/glitch.gif') center/cover no-repeat; z-index:150; pointer-events:none; opacity: 0.8;">
  </div>

  <audio id="audio-gameover" src="assets/musica/musica_mickey.mp4"></audio>

  <!-- audio de alonso para la mecanica de retencion -->
  <audio id="audio-alonso" src="assets/musica/audioalonso.mp3" preload="auto"></audio>

  <!-- audio de pasos cuando llega a camara 4 -->
  <audio id="audio-pasos" src="assets/musica/pasos.mp3" preload="auto"></audio>

  <!-- musica de fondo: tension -->
  <audio id="musica-tension" src="assets/musica/sonido de fondo.mp3" loop></audio>

  <!-- audio de alonso respirando -->
  <audio id="audio-respiracion" src="assets/musica/respiracion_alonso.mp3" loop preload="auto"></audio>

  <!-- audio de pasos corriendo para cuando falla la camara -->
  <audio id="audio-pasos-corriendo" src="assets/musica/PASOS CORRIENDO.mp3" preload="auto"></audio>

  <!-- audio de risa de nino ambiente -->
  <audio id="audio-risa" src="assets/musica/risa de niño.mp3" preload="auto"></audio>

  <!-- audio de risa de demonio para bloqueo de camara -->
  <audio id="audio-demonio" src="assets/musica/demonio risa .mp3" preload="auto"></audio>

  <!-- audio de respiracion alonso fnaf ambiental -->
  <audio id="audio-respiracion-fnaf" src="assets/musica/RESPIRACION ALONSO fnaf.mp3" preload="auto"></audio>

  <!-- audio de caja de musica de alonso -->
  <audio id="audio-caja" src="assets/musica/caja de musica de alonso.mp3" preload="auto"></audio>

  <!-- audios de falta de energia -->
  <audio id="audio-powerdown" src="assets/musica/powerdown.mp3" preload="auto"></audio>
  <audio id="audio-sevalaluz" src="assets/musica/se va la luz.mp3" preload="auto"></audio>
  <audio id="audio-linterna" src="assets/musica/linterna.mp3" preload="auto"></audio>

  <!-- ui de textos -->
  <div id="texto-hora" class="ui-texto">12:00 PM</div>
  <div id="texto-noche" class="ui-texto">Noche 2</div>
  <div id="texto-energia" class="ui-texto">energia: 100%</div>

  <!-- botones principales -->
  <div id="ui-botones">
    <button class="btn" id="btn-puerta" onclick="togglePuerta()">Cerrar Puerta</button>
    <button class="btn" id="btn-camaras" onclick="abrirCamaras()">Subir Camaras</button>
  </div>

  <!-- pantalla de camaras -->
  <div id="camaras">
    <div id="vista-camara"></div>
    <div id="scanlines"></div>
    <div id="instruccion">Manten clic en la pantalla para usar la linterna</div>

    <!-- boton audio: solo visible cuando ves la camara de alonso -->
    <button id="btn-audio" onclick="usarAudio()">&#9834; Usar Audio</button>
    <div id="contador-retencion">Reteniendo: <span id="seg-retencion">20</span>s</div>

    <!-- video de animacion de alonso saliendo de sala 1 -->
    <video id="video-animacion-alonso-sala1" src="assets/videos/animaciones de camaras/alonsosala1.mp4" playsinline
      style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:22; pointer-events:none;">
    </video>

    <!-- 4 salas: la sala 2 original ha sido eliminada -->
    <div id="lista-camaras">
      <button class="btn-cam activo" id="btn-cam-1" onclick="cambiarCam(1)">CAM 1</button>
      <button class="btn-cam" id="btn-cam-2" onclick="cambiarCam(2)">CAM 2</button>
      <button class="btn-cam" id="btn-cam-3" onclick="cambiarCam(3)">CAM 3</button>
      <button class="btn-cam" id="btn-cam-4" onclick="cambiarCam(4)">CAM 4</button>
    </div>

    <button class="btn" id="btn-bajar-cam" onclick="cerrarCamaras()">Bajar Camaras</button>
  </div>

  <!-- subtitulo estilo netflix -->
  <div id="subtitulo"></div>

  <!-- game over modificado con la imagen de alonso de pie -->
  <div id="pantalla-gameover" style="background-color: black;">
    <div
      style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('assets/imagenes/escenarios/sala_principal/oficina.png') center/cover no-repeat; z-index: -1;">
    </div>
    <h1 style="text-shadow: 2px 2px 5px black;">GAME OVER</h1>
    <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
      <button onclick="window.location.href='juego_noche2.html'">volver a intentarlo</button>
      <button onclick="window.location.href='menu.html'">volver al menu</button>
    </div>
  </div>

  <script>
    // =============================================
    // 4 salas: 1, 2, 3, 4
    // imagenes base sin personaje
    // =============================================
    var escBase = {
      1: { osc: "assets/imagenes/escenarios/sala1/sala1_oscura.jpeg", lin: "assets/imagenes/escenarios/sala1/sala1_linterna.jpeg" },
      2: { osc: "assets/imagenes/escenarios/sala2/sala2_oscura.jpeg", lin: "assets/imagenes/escenarios/sala2/sala2_linterna.png" },
      3: { osc: "assets/imagenes/escenarios/sala3/sala3_oscura.png", lin: "assets/imagenes/escenarios/sala3/sala3_linterna.png" },
      4: { osc: "assets/imagenes/escenarios/sala4/sala4_oscura.png", lin: "assets/imagenes/escenarios/sala4/sala4_linterna.png" }
    };

    // imagenes de alonso en cada sala (donde existen)
    // sala4 no tiene imagen de alonso, se usa imagen base sin personaje
    var escAlonso = {
      1: { osc: "assets/imagenes/escenarios/personajes/alonso/sala1_oscura.jpeg", lin: "assets/imagenes/escenarios/personajes/alonso/sala1_linterna.png" },
      2: { osc: "assets/imagenes/escenarios/personajes/alonso/sala2_oscura.jpeg", lin: "assets/imagenes/escenarios/personajes/alonso/sala2_linterna.png" },
      3: { osc: "assets/imagenes/escenarios/personajes/alonso/sala3_oscura.jpg", lin: "assets/imagenes/escenarios/personajes/alonso/sala3_linterna.jpg" },
      4: { osc: "assets/imagenes/escenarios/personajes/alonso/sala4_oscura.jpg", lin: "assets/imagenes/escenarios/personajes/alonso/sala4_linterna.jpg" }
    };

    // =============================================
    // estado del juego
    // =============================================
    var camActual = 1;
    var linterna = false;
    var puertaCerrada = false;
    var animandoPuerta = false;
    var hora = 0;
    var energia = 100;

    // alonso empieza en sala 1, se mueve 1->2->3->4->oficina
    var alonsoPos = 1;
    var alonsoRetenido = false;
    var audioEnCooldown = false;

    // contador de segundos mirando la camara de alonso (para el aura)
    var segMirandoAlonso = 0;
    // el hint solo se muestra una vez para no ser pesado
    var hintAuraMostrado = false;
    var juegoTerminado = false;

    // probabilidad de movimiento de alonso (se aumenta a las 5 AM)
    var probabilidadAlonso = 0.6;
    var camaraFallo = false;
    var camaraBloqueada = 0; // camara especifica que queda inservible
    var cajaMusicaActiva = false;
    var camarasDestruidas = false; // fallo global a las 5 AM
    // animacion de alonso saliendo de sala 1 (no bloquea el movimiento)
    var animacionAlonsoSala1Activa = false;

    // =============================================
    // referencias DOM
    // =============================================
    var vistaCam = document.getElementById("vista-camara");
    var panelCamaras = document.getElementById("camaras");
    var videoPuerta = document.getElementById("video-puerta");
    var audioAlonso = document.getElementById("audio-alonso");
    var btnPuerta = document.getElementById("btn-puerta");
    var textoHora = document.getElementById("texto-hora");
    var textoEnergia = document.getElementById("texto-energia");
    var btnAudio = document.getElementById("btn-audio");
    var contadorRet = document.getElementById("contador-retencion");
    var segRet = document.getElementById("seg-retencion");
    var gameOverDiv = document.getElementById("pantalla-gameover");
    var subtitulo = document.getElementById("subtitulo");
    var subTimer = null;
    var musicaTension = document.getElementById("musica-tension");

    function actualizarUIEnergia() {
      if (!textoEnergia) return;
      textoEnergia.innerText = "energia: " + Math.floor(energia) + "%";
      if (energia < 20) {
        textoEnergia.style.color = "#ff0000";
        textoEnergia.style.fontWeight = "bold";
        textoEnergia.style.textShadow = "0 0 10px red";
      } else {
        textoEnergia.style.color = "white";
        textoEnergia.style.fontWeight = "normal";
        textoEnergia.style.textShadow = "none";
      }
    }

    // referencias para el screamer
    var videoScreamer = document.getElementById("video-screamer");
    var pantallaFlashes = document.getElementById("pantalla-flashes");
    var audioGameover = document.getElementById("audio-gameover");

    // =============================================
    // desbloqueo de media para moviles y navegadores estrictos
    // =============================================
    var mediaDesbloqueada = false;
    function desbloquearMedia() {
      if (mediaDesbloqueada) return;
      mediaDesbloqueada = true;
      [videoScreamer, document.getElementById("video-golpes"), document.getElementById("video-golpes-2"), audioGameover, audioAlonso, videoPuerta, musicaTension, document.getElementById("audio-respiracion"), document.getElementById("audio-pasos-corriendo"), document.getElementById("audio-risa"), document.getElementById("audio-demonio"), document.getElementById("audio-respiracion-fnaf"), document.getElementById("audio-caja"), document.getElementById("audio-powerdown"), document.getElementById("audio-sevalaluz"), document.getElementById("audio-linterna")].forEach(function (m) {
        if (!m) return;
        m.muted = true;
        var p = m.play();
        if (p !== undefined) {
          p.then(function () {
            m.pause();
            m.muted = false;
            if (m.id === "musica-tension") {
              m.volume = 0.15;
              m.play().catch(function () { });
            } else {
              m.currentTime = 0;
            }
          }).catch(function () { });
        }
      });
    }
    document.addEventListener("click", desbloquearMedia, { once: true });
    document.addEventListener("touchstart", desbloquearMedia, { once: true });

    // =============================================
    // funcion para iniciar el screamer de alonso
    // oculta todo, reproduce el video con luces y luego muestra el game over
    // =============================================
    function iniciarScreamer(mensaje, usarEspecial) {
      if (juegoTerminado && !usarEspecial) return;
      juegoTerminado = true;
      // Restablecer filtros para que el screamer se vea bien (no oscuro)
      document.body.style.filter = "none";
      cerrarCamaras();
      // Solo detener audios de apagon si NO es el screamer especial (puerta cerrada)
      if (!usarEspecial) {
        detenerAudiosApagon();
      }
      document.getElementById("ui-botones").style.display = "none";
      document.getElementById("texto-hora").style.display = "none";
      document.getElementById("texto-noche").style.display = "none";
      document.getElementById("texto-energia").style.display = "none";

      // elegir screamer (normal o especial)
      var vid = videoScreamer;
      if (usarEspecial) {
        vid = document.getElementById("video-screamer-especial");
      }

      // reproducir screamer
      vid.style.display = "block";
      vid.currentTime = 0;
      vid.play().catch(function () { });

      // parar la musica de la caja si esta sonando y restaurar audios
      var audioCaja = document.getElementById("audio-caja");
      if (audioCaja) {
        audioCaja.pause();
        var todosAudios = document.querySelectorAll('audio');
        todosAudios.forEach(function (a) { a.muted = false; });
      }

      // luces parpadeantes (flashes blancos)
      pantallaFlashes.style.display = "block";
      var parpadeo = setInterval(function () {
        pantallaFlashes.style.opacity = Math.random() > 0.5 ? "0.6" : "0";
      }, 50);

      // al terminar el screamer, mostrar game over y reproducir musica
      vid.onended = function () {
        detenerAudiosApagon();
        clearInterval(parpadeo);
        pantallaFlashes.style.display = "none";
        vid.style.display = "none";

        gameOverDiv.style.display = "flex";
        audioGameover.currentTime = 0;
        audioGameover.play().catch(function () { });
      };
    }

    function detenerAudiosApagon() {
      var pwrDown = document.getElementById("audio-powerdown");
      var lzOut = document.getElementById("audio-sevalaluz");
      if (pwrDown) { pwrDown.pause(); pwrDown.currentTime = 0; }
      if (lzOut) { lzOut.pause(); lzOut.currentTime = 0; }
    }

    function reproducirGolpes() {
      var v1 = document.getElementById("video-golpes");
      var v2 = document.getElementById("video-golpes-2");
      if (!v1 || !v2) return null;

      var vid = (Math.random() < 0.5) ? v1 : v2;
      vid.style.display = "block";
      vid.currentTime = 0;
      vid.loop = true; // Loopear para que dure lo necesario
      vid.play().catch(function () { });

      // Retornar funcion para detener el video
      return function () {
        vid.pause();
        vid.style.display = "none";
        vid.loop = false;
      };
    }

    // =============================================
    // parpadeo de luces en la oficina (se mantiene mientras este en CAM 4)
    // =============================================
    var intervalParpadeo = null;
    function actualizarEfectosCam4() {
      var flash = document.getElementById("pantalla-parpadeo");
      var respVisual = document.getElementById("pantalla-respiracion");
      var audioResp = document.getElementById("audio-respiracion");

      if (!flash || !respVisual || !audioResp) return;

      if (alonsoPos === 4) {
        // efecto parpadeo negro
        if (!intervalParpadeo) {
          flash.style.display = "block";
          intervalParpadeo = setInterval(function () {
            flash.style.opacity = (flash.style.opacity === "0" || flash.style.opacity === "") ? "0.4" : "0";
          }, 100);

          // reproducir audio de pasos al llegar
          var audioPasos = document.getElementById("audio-pasos");
          if (audioPasos) {
            audioPasos.currentTime = 0;
            audioPasos.play().catch(function () { });
          }

          // iniciar respiracion visual y sonora
          respVisual.style.display = "block";
          respVisual.classList.add("efecto-respiracion");
          audioResp.volume = 0.6;
          audioResp.play().catch(function () { });
        }
      } else {
        if (intervalParpadeo) {
          clearInterval(intervalParpadeo);
          intervalParpadeo = null;
          flash.style.display = "none";
          flash.style.opacity = "0";

          // detener respiracion visual y sonora
          respVisual.style.display = "none";

        return usarLinterna ? escAlonso[sala].lin : escAlonso[sala].osc;

    // =============================================
    // aura de alonso: si llevas 10 segundos seguidos mirando su camara
    // te quita 8 de energia de golpe y el ciclo se repite
    // a los 7 segundos muestra un hint (solo la primera vez)
    // =============================================
    setInterval(function () {
      // si no hay camaras abiertas o no miras a alonso, resetear
      if (panelCamaras.style.display !== "block" || camActual !== alonsoPos) {
        segMirandoAlonso = 0;
        return;
      }

      segMirandoAlonso++;

      // hint de aviso la primera vez, a los 7 segundos
      if (segMirandoAlonso === 7 && !hintAuraMostrado) {
        hintAuraMostrado = true;
        mostrarSub("Cuidado... si lo sigues mirando te quitara energia", 3000);
      }

      // a los 10 segundos: drenar 2 de energia y reiniciar el ciclo
      if (segMirandoAlonso >= 10) {
        segMirandoAlonso = 0;
        energia -= 2;
        if (energia < 0) energia = 0;
        actualizarUIEnergia();
        mostrarSub("El aura de Alonso te ha quitado 2 de energia", 2500);
        if (energia <= 0) apagarTodo();
      }
    }, 1000);

    // =============================================

    // =============================================
    function usarAudio() {
      if (audioEnCooldown || alonsoRetenido || energia <= 0) return;

      // reproducir audio de alonso
      audioAlonso.currentTime = 0;
      audioAlonso.play().catch(function () { });

      alonsoRetenido = true;
      audioEnCooldown = true;

      var segundos = 15;
      segRet.innerText = segundos;

          setTimeout(function () {

          }, 25000);
        }
      }, 1000);

      actualizarCamara();

    // =============================================
    // movimiento de alonso: cada 10s tiene 60% de avanzar
    // ruta: sala1 -> sala2 -> sala3 -> sala4 -> oficina
    // al llegar a sala4 y la puerta esta cerrada, se va a sala aleatoria
    // =============================================
    function intentarMoverAlonso() {
      if (alonsoRetenido || energia <= 0 || juegoTerminado) return;

      // si la caja de musica esta activa, la probabilidad de exito es casi total
      var probActual = cajaMusicaActiva ? 0.9 : probabilidadAlonso;
      if (Math.random() > probActual) return;

      var siguiente = alonsoPos + 1;

      if (siguiente > 4) {
        // Reproducir sonido de pasos para avisar del ataque inminente
        var audioPasos = document.getElementById("audio-pasos-corriendo");
        if (audioPasos) {
          audioPasos.currentTime = 0;
          audioPasos.play().catch(function () { });
        }

        // Damos al menos 2 segundos extra para reaccionar (o 3 si la musica esta activa)
        var delayExtra = (cajaMusicaActiva) ? 3000 : 2000;

        setTimeout(function () {
          if (juegoTerminado || energia <= 0 || alonsoPos !== 4) return;

          if (puertaCerrada) {
            // Si la puerta ya esta cerrada, Alonso choca inmediatamente
            var detenerV = reproducirGolpes();

            energia -= 7;
            if (energia < 0) energia = 0;
            actualizarUIEnergia();
            mostrarSub("Alonso ha golpeado la puerta! Pierdes 7% de energia", 4000);
            if (energia <= 0) apagarTodo();

            var salaRandom = Math.floor(Math.random() * 3) + 1;
            setTimeout(function () {
              alonsoPos = salaRandom;
              actualizarEfectosCam4();
              if (panelCamaras.style.display === "block") actualizarCamara();

              // Detener los golpes 1 segundo despues de que se haya ido
              setTimeout(function () {
                if (detenerV) detenerV();
              }, 1000);
            }, 2000);
          } else if (animandoPuerta) {
            // Si se esta cerrando, no hacemos nada aqui.
            // La funcion togglePuerta() se encargara de Alonso cuando el video termine.
          } else {
            iniciarScreamer();
          }
        }, delayExtra);
        return;
      }

      // si alonso sale de sala 1, reproducir la animacion en cam 1 (sin bloquear el movimiento)
      if (alonsoPos === 1) {
        var videoAnimS1 = document.getElementById("video-animacion-alonso-sala1");
        if (videoAnimS1) {
          animacionAlonsoSala1Activa = true;
          // alonso avanza de inmediato, el video es solo visual
          alonsoPos = siguiente;
          actualizarEfectosCam4();
          if (panelCamaras.style.display === "block") actualizarCamara();

          videoAnimS1.currentTime = 0;
          videoAnimS1.play().catch(function () { });
          videoAnimS1.onended = function () {
            animacionAlonsoSala1Activa = false;
            videoAnimS1.style.display = "none";
            distorsionCamara();
            if (panelCamaras.style.display === "block") actualizarCamara();
          };
        } else {
          alonsoPos = siguiente;
          actualizarEfectosCam4();
          if (panelCamaras.style.display === "block") actualizarCamara();
        }
        return;
      }

      alonsoPos = siguiente;
      actualizarEfectosCam4();
      if (panelCamaras.style.display === "block") actualizarCamara();
    }

    // bucle normal de movimiento (cada 10s)
    setInterval(intentarMoverAlonso, 10000);

    // bucle de agresividad extrema (cada 2s) solo activo con la caja de musica
    setInterval(function () {
      if (cajaMusicaActiva && alonsoPos !== 4) intentarMoverAlonso();
    }, 2000);

    setInterval(function () {

    // =============================================
    // apagon al quedarse sin energia
    // =============================================
    function apagarTodo() {
      if (juegoTerminado) return;
      mostrarSub("¡No tienes energía!", 4000);

      panelCamaras.style.display = "none";
      videoPuerta.style.display = "none";
      videoPuerta.pause();
      if (audioAlonso) audioAlonso.pause();
      musicaTension.pause();

      // detener musica de la caja y restaurar audios
      var audioCaja = document.getElementById("audio-caja");
      if (audioCaja) {
        audioCaja.pause();
        var todosAudios = document.querySelectorAll('audio');
        todosAudios.forEach(function (a) { a.muted = false; });
      }
      linterna = false;
      puertaCerrada = false;
      animandoPuerta = false;

      // Efecto de "luz pobre" y parpadeo en lugar de negro total
      document.body.style.transition = "filter 2s";
      document.body.style.filter = "brightness(0.05) contrast(1.2)";

      // Iniciar un pequeño parpadeo residual de la luz de la oficina
      var flickerApagon = setInterval(function () {
        if (juegoTerminado) {
          clearInterval(flickerApagon);
          return;
        }
        var b = 0.02 + Math.random() * 0.08;
        document.body.style.filter = "brightness(" + b + ") contrast(1.2)";
      }, 150);

      // Secuencia de audios
      var pwrDown = document.getElementById("audio-powerdown");
      var lzOut = document.getElementById("audio-sevalaluz");

      if (pwrDown) {
        pwrDown.play().catch(function () { });
        pwrDown.onended = function () {
          if (lzOut) {
            lzOut.play().catch(function () { });

            // El screamer salta DURANTE la música de "se va la luz"
            // (entre 4 y 8 segundos después de empezar la música)
            var tiempoParaSusto = 4000 + Math.random() * 4000;
            setTimeout(function () {
              if (!juegoTerminado) {
                iniciarScreamer();
              }
            }, tiempoParaSusto);
          } else {
            setTimeout(function () { iniciarScreamer(); }, 2000);
          }
        };
      } else {
        // Fallback
        setTimeout(function () {
          iniciarScreamer();
        }, 3000);
      }
    }

          cajaMusicaActiva = true;

          // Silenciar todos los demas audios para que solo se oiga la caja
          var todosAudios = document.querySelectorAll('audio');
          todosAudios.forEach(function (a) {
            if (a.id !== "audio-caja") {
              a.muted = true;
            }
          });

          audioCaja.volume = 1.0; // Volumen maximo para la caja
          document.body.classList.add("glitch-caja-activa");
          mostrarSub("¡La caja de música de Alonso está sonando! Se ha vuelto loco...", 5000);

          audioCaja.currentTime = 0;
          audioCaja.play().catch(function () { });

          audioCaja.onended = function () {
            cajaMusicaActiva = false;
            // Restaurar el sonido de los demas audios
            todosAudios.forEach(function (a) {
              a.muted = false;
            });
            document.body.classList.remove("glitch-caja-activa");
            mostrarSub("La música se ha detenido...", 3000);
          };
        }
      }
    }, 20000);

    // =============================================
    // efecto reloj roto (5 AM)
    // =============================================
    setInterval(function () {
      if (juegoTerminado || energia <= 0 || hora < 5) return;

      var clock = document.getElementById("texto-hora");
      if (!clock) return;

      // 40% de probabilidad cada 4 segundos de glitch visual
      if (Math.random() < 0.4) {
        var glitches = ["5:?? AM", "??:?? AM", "6:66 AM", "#$:%& AM", "ERROR", "5:-- AM", "88:88"];
        var originalText = "5:00 AM";
        clock.innerText = glitches[Math.floor(Math.random() * glitches.length)];
        clock.style.color = "#ff3333";
        clock.style.textShadow = "0 0 8px red";

        setTimeout(function () {
          if (hora === 5 && !juegoTerminado) {
            clock.innerText = "5:00 AM";
            clock.style.color = "white";
            clock.style.textShadow = "none";
          }
        }, 600 + Math.random() * 1200);
      }
    }, 4000);

    // =============================================
    // Parpadeo de linterna (baja energia < 30%)
    // =============================================
    setInterval(function () {
      if (juegoTerminado || energia <= 0 || camaraFallo || (typeof camaraBloqueada !== 'undefined' && camaraBloqueada !== 0)) return;

      if (linterna && energia < 30) {
        // Generar un parpadeo aleatorio si la energia es baja
        var b = 0.2 + Math.random() * 0.9;
        vistaCam.style.filter = "brightness(" + b + ")";
      } else if (linterna && energia >= 30) {
        if (vistaCam.style.filter.includes("brightness")) {
          vistaCam.style.filter = "none";
        }
      }
    }, 60);

  </script>
